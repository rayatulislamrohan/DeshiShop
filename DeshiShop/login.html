<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ShopBD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --green:#1a3a2a; --ivory:#f5f0e8; --red:#c0392b; }
    body { background:var(--green); color:var(--green); font-family:'Source Sans 3',sans-serif; margin:0; min-height:100vh; display:flex; flex-direction:column; }
    h1,h2,h3,h4,h5 { font-family:'Playfair Display',serif; }
    .top-bar { background:rgba(0,0,0,.2); color:rgba(245,240,232,.8); font-size:.82rem; padding:6px 0; }
    .top-bar a { color:rgba(245,240,232,.8); text-decoration:none; margin-left:16px; }
    .top-bar a:hover { color:var(--red); }
    .brand-bar { background:var(--green); padding:14px 0; border-bottom:2px solid rgba(245,240,232,.1); }
    .brand-link { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--ivory)!important; font-weight:700; text-decoration:none; }
    .brand-link span { color:var(--red); }
    .login-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
    .login-box { background:#fff; border-radius:10px; padding:44px 36px; width:100%; max-width:440px; box-shadow:0 10px 40px rgba(0,0,0,.25); }
    .login-box h2 { margin-bottom:.4rem; }
    .login-box .sub { color:#666; font-size:.92rem; margin-bottom:1.8rem; }
    .form-label { font-weight:600; color:var(--green); font-size:.9rem; }
    .form-control { border:1.5px solid rgba(26,58,42,.2); border-radius:4px; padding:10px 14px; }
    .form-control:focus { border-color:var(--green); box-shadow:0 0 0 .2rem rgba(26,58,42,.15); }
    .input-group-text { background:var(--green); color:#fff; border:none; }
    .btn-login { background:var(--red); color:#fff; border:none; padding:12px; border-radius:4px; font-weight:700; font-size:1rem; width:100%; cursor:pointer; transition:background .2s; }
    .btn-login:hover { background:#a93226; }
    .forgot { text-align:right; margin-top:6px; }
    .forgot a { color:var(--red); font-size:.85rem; text-decoration:none; }
    .divider { text-align:center; position:relative; margin:18px 0; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:rgba(26,58,42,.15); }
    .divider span { background:#fff; padding:0 12px; position:relative; color:#888; font-size:.85rem; }
    .register-link { text-align:center; margin-top:16px; font-size:.9rem; }
    .register-link a { color:var(--red); font-weight:700; text-decoration:none; }
    .success-bar { display:none; background:#d4edda; border:1px solid #c3e6cb; color:#155724; padding:10px 16px; border-radius:4px; font-size:.9rem; margin-top:12px; }
    .footer-bar { background:rgba(0,0,0,.3); color:rgba(245,240,232,.5); padding:14px 0; text-align:center; font-size:.82rem; }
    .footer-bar a { color:var(--red); text-decoration:none; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="container d-flex justify-content-between">
    <span><i class="fa-solid fa-truck me-1"></i>Free delivery on orders over ৳999</span>
    <div>
      <a href="signup.html"><i class="fa-solid fa-user-plus me-1"></i>New here? Register</a>
    </div>
  </div>
</div>

<!-- BRAND BAR -->
<div class="brand-bar">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="brand-link" href="index.html">Shop<span>BD</span></a>
    <nav>
      <a href="index.html" style="color:rgba(245,240,232,.7);text-decoration:none;margin-left:20px;font-weight:600"><i class="fa-solid fa-house me-1"></i>Home</a>
      <a href="products.html" style="color:rgba(245,240,232,.7);text-decoration:none;margin-left:20px;font-weight:600"><i class="fa-solid fa-store me-1"></i>Products</a>
      <a href="signup.html" style="color:rgba(245,240,232,.7);text-decoration:none;margin-left:20px;font-weight:600"><i class="fa-solid fa-user-plus me-1"></i>Register</a>
    </nav>
  </div>
</div>

<!-- LOGIN FORM -->
<div class="login-wrap">
  <div class="login-box">
    <h2><i class="fa-solid fa-right-to-bracket me-2" style="color:var(--red)"></i>Welcome Back</h2>
    <p class="sub">Login to your ShopBD account</p>

    <div class="mb-3">
      <label class="form-label">Email Address <span style="color:var(--red)">*</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" class="form-control" placeholder="you@example.com" id="emailInp"/>
      </div>
    </div>

    <div class="mb-1">
      <label class="form-label">Password <span style="color:var(--red)">*</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
        <input type="password" class="form-control" placeholder="Enter your password" id="pwdInp"/>
        <span class="input-group-text" onclick="togglePwd()" style="cursor:pointer;background:#eee;color:var(--green);border:1.5px solid rgba(26,58,42,.2)"><i class="fa-solid fa-eye" id="eyeIcon"></i></span>
      </div>
    </div>
    <div class="forgot mb-3"><a href="#">Forgot password?</a></div>

    <div class="mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="remember" style="accent-color:var(--red)"/>
        <label class="form-check-label small" for="remember">Remember me on this device</label>
      </div>
    </div>

    <button class="btn-login" onclick="handleLogin()">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Login to My Account
    </button>

    <div class="success-bar" id="successMsg">
      <i class="fa-solid fa-circle-check me-2"></i>Login successful! <a href="index.html" style="color:var(--green);font-weight:700">Go to Home →</a>
    </div>

    <div class="divider"><span>or</span></div>

    <div class="register-link">Don't have an account? <a href="signup.html">Register here</a></div>
  </div>
</div>

<div class="footer-bar">© 2026 ShopBD — <a href="#">Privacy Policy</a></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd() {
    const inp = document.getElementById('pwdInp');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  }
  function handleLogin() {
    document.getElementById('successMsg').style.display = 'block';
  }
</script>
</body>
</html>
